name: Deploy to Vercel

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    environment: preview
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

      - name: Validate Vercel Secrets
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "::error::Missing secret VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "::error::Missing secret VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "::error::Missing secret VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel Environment
        run: pnpm dlx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Project Artifacts
        run: pnpm dlx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel Preview
        run: pnpm dlx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

  deploy-production:
    if: github.event_name != 'pull_request'
    environment: production
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

      - name: Validate Vercel Secrets
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "::error::Missing secret VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "::error::Missing secret VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "::error::Missing secret VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel Environment
        run: pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Project Artifacts
        run: pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel Production
        run: pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
